<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FreshMarket</title>

    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <main class="login">
        <div class="login__container">

            <h2 class="login__title">Iniciar Sesión</h2>

            <form id="loginForm" class="login__form">

                <!-- Correo -->
                <div class="login__group">
                    <label class="login__label">Correo</label>
                    <input type="email" id="correo" class="login__input" required>
                </div>

                <!-- Contraseña -->
                <div class="login__group">
                    <label class="login__label">Contraseña</label>
                    <input type="password" id="password" class="login__input" required>
                </div>

                <!-- Error -->
                <p id="errorMsg" class="login__error"></p>

                <button type="submit" class="login__button">
                    Ingresar
                </button>

                <p class="login__register">
                    ¿No tienes cuenta?
                    <a href="/paginas/registro.html">Regístrate aquí</a>
                </p>

            </form>

        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>

</body>

</html>
