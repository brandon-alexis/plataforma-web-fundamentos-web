<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FreshMarket</title>

    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/registro.css">
</head>

<body>

    <main class="registro">

        <div class="registro__container">

            <h2 class="registro__title">Crear Cuenta</h2>

            <form id="registroForm" class="registro__form">

                <!-- Nombre -->
                <div class="registro__group">
                    <label class="registro__label">Nombre</label>
                    <input type="text" id="nombre" class="registro__input" required>
                </div>

                <!-- Correo -->
                <div class="registro__group">
                    <label class="registro__label">Correo electrónico</label>
                    <input type="email" id="correo" class="registro__input" required>
                </div>

                <!-- Teléfono -->
                <div class="registro__group">
                    <label class="registro__label">Teléfono</label>
                    <input type="text" id="telefono" class="registro__input" required>
                </div>

                <!-- Dirección -->
                <div class="registro__group">
                    <label class="registro__label">Dirección</label>
                    <input type="text" id="direccion" class="registro__input" required>
                </div>

                <!-- Contraseña -->
                <div class="registro__group">
                    <label class="registro__label">Contraseña</label>
                    <input type="password" id="password" class="registro__input" required>
                </div>

                <!-- Error -->
                <p id="errorMsg" class="registro__error"></p>

                <button type="submit" class="registro__button">
                    Registrarse
                </button>

                <p class="registro__login">
                    ¿Ya tienes cuenta?
                    <a href="/paginas/login.html">Inicia sesión aquí</a>
                </p>

            </form>

        </div>

    </main>

    <script src="/js/app.js"></script>
    <script src="/js/registro.js"></script>

</body>

</html>
